<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>おふろ魚図鑑 照合テスト(検証版)</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="魚図鑑検証">
<meta name="theme-color" content="#1565c0">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>🐟 照合テスト</h1>
  <span id="standaloneBadge" class="badge"></span>
</header>
<main>
  <section>
    <div class="videoWrap">
      <video id="video" playsinline muted autoplay></video>
      <div class="guide"></div>
    </div>
    <p id="camStatus" class="status" role="status"></p>
    <div class="modeRow">
      <label><input type="radio" name="mode" value="register"> 基準を登録</label>
      <label><input type="radio" name="mode" value="judge" checked> 判定する</label>
    </div>
    <button id="captureBtn" class="big">📷 撮影する</button>
    <label class="fileBtn">🖼 ファイルから選ぶ<input type="file" id="fileInput" accept="image/*" hidden></label>
  </section>

  <section>
    <h2>基準写真(今日の魚) <button id="clearRefs" class="small">全消去</button></h2>
    <div id="refList" class="thumbs"></div>
    <p class="hint">同じ物を角度を変えて2〜3枚登録すると安定します。判定は「登録した写真の中で一番近いもの」とのスコアです。</p>
  </section>

  <section>
    <h2>設定</h2>
    <label class="row"><input type="checkbox" id="mnetChk"> MobileNetも使う <span id="mnetStatus" class="hint"></span></label>
    <p class="hint">※初回のみ約3MBをダウンロードします(通信が必要)</p>
    <label class="row">色ヒストグラムしきい値
      <input type="range" id="histTh" min="0" max="1" step="0.01"> <b id="histThVal"></b>
    </label>
    <label class="row">MobileNetしきい値
      <input type="range" id="mnetTh" min="0" max="1" step="0.01"> <b id="mnetThVal"></b>
    </label>
  </section>

  <section>
    <h2>判定結果</h2>
    <div id="result"><p class="hint">「判定する」モードで撮影すると結果が出ます</p></div>
  </section>

  <section>
    <h2>履歴(この画面を開いている間のみ)</h2>
    <div id="history" class="history"></div>
  </section>
</main>

<script src="js/matcher-histogram.js"></script>
<script src="js/matcher-mobilenet.js"></script>
<script src="js/camera.js"></script>
<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
